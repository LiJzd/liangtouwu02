spring:
  profiles:
    active: dev
  application:
    name: liangtouwu-backend
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:pig-farm-ai-group}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080
  servlet:
    context-path: /api

ai:
  fastapi:
    base-url: http://localhost:8000
  kafka:
    tasks-topic: ${AI_KAFKA_TASKS_TOPIC:pig-farm-tasks}
    results-topic: ${AI_KAFKA_RESULTS_TOPIC:pig-farm-results}

xfyun:
  tts:
    enabled: true
    app-id: ${XFYUN_TTS_APP_ID:3340aff1}
    api-key: ${XFYUN_TTS_API_KEY:87989f1b8f5095384b63726ab1df1764}
    api-secret: ${XFYUN_TTS_API_SECRET:ZWE2ZmJkMTBlYTJiMTFkZmI4ODZhNmRj}
    voice-name: ${XFYUN_TTS_VOICE_NAME:x4_xiaoyan}
    speed: ${XFYUN_TTS_SPEED:50}
    volume: ${XFYUN_TTS_VOLUME:50}
    pitch: ${XFYUN_TTS_PITCH:50}

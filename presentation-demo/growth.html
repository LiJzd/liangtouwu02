<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猪只生长体重预测模型对比 - 两头乌 AI 演示中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/style.css?v=2.2">
    <link rel="stylesheet" href="css/growth.css?v=2.2">
    <!-- 更换为更稳定的 CDNJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>两头乌 AI 演示中心</h1>
                <p>双轨生长分析系统：基于生物方程的动态残差拟合展示</p>
            </div>
            <nav class="module-nav">
                <a href="index.html" class="nav-item">语义推理中心</a>
                <a href="growth.html" class="nav-item active">生长分析系统</a>
            </nav>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-label">环境生长效率</span>
                <span class="stat-value" id="efficiency-val">98.5%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">累计出栏体重</span>
                <span class="stat-value" id="weight-val">120.4 kg</span>
            </div>
            <div class="stat-card highlight">
                <span class="stat-label">模型拟合度</span>
                <span class="stat-value" id="fitting-val">智能体 (最优)</span>
            </div>
        </div>

        <main class="chart-section" style="background: rgba(0, 10, 20, 0.9); min-height: 500px; display: flex; align-items: center; justify-content: center;">
            <div id="growth-chart" style="width: 100%; height: 500px; min-height: 500px;">
                <div style="color: rgba(0, 242, 255, 0.4); text-align: center; font-family: 'Fira Code', monospace; padding: 100px;">
                    [SYSTEM_BOOT] ENGINE_WARMING_UP...
                </div>
            </div>
        </main>

        <footer class="control-panel">
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">环境温度 (°C)</span>
                    <span class="slider-value" id="temp-display">22</span>
                </div>
                <input type="range" id="temp-slider" min="15" max="40" value="22" step="1">
                <div class="slider-ticks">
                    <span>15</span>
                    <span>25</span>
                    <span>35</span>
                </div>
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">采食量比例 (%)</span>
                    <span class="slider-value" id="feed-display">100</span>
                </div>
                <input type="range" id="feed-slider" min="50" max="100" value="100" step="1">
                <div class="slider-ticks">
                    <span>50%</span>
                    <span>75%</span>
                    <span>100%</span>
                </div>
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">个体健康指数 (%)</span>
                    <span class="slider-value" id="health-display">100</span>
                </div>
                <input type="range" id="health-slider" min="70" max="100" value="100" step="1">
                <div class="slider-ticks">
                    <span>病态</span>
                    <span>亚健康</span>
                    <span>健康</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- 内联引擎逻辑，消除外部文件加载风险 -->
    <script>
    (function() {
        /**
         * 猪只生长分析系统 - 核心逻辑插件 (Realistic Build 2.5)
         * 引入 Box-Muller 高斯分布与自相关生物波动模型
         */
        const boot = () => {
            console.log("Dual-Track Growth Engine: Booting with High-Fidelity Data...");

            if (typeof echarts === 'undefined') {
                document.getElementById('growth-chart').innerHTML = `<div style="color:#ff003c; border:1px solid #ff003c; padding:20px; text-align:center;">
                    [FATAL_ERROR] echarts.js FAILED_TO_LOAD. PLEASE_CHECK_NETWORK.
                </div>`;
                return;
            }

            const chartDom = document.getElementById('growth-chart');
            if (!chartDom) return;

            const myChart = echarts.init(chartDom);
            const $ = (id) => document.getElementById(id);
            const tempSlider = $('temp-slider'), feedSlider = $('feed-slider'), healthSlider = $('health-slider');
            const tempDisp = $('temp-display'), feedDisp = $('feed-display'), healthDisp = $('health-display');
            const effVal = $('efficiency-val'), weightVal = $('weight-val');

            // --- 两头乌品种标准模型参数 ---
            const CONFIG = {
                days: 150,
                K: 135,      // 成熟体重上限 (kg)
                A: 2.8,      // 初始系数 (调整为 2.8 使起始体重约为 8kg，符合断奶入栏标准)
                B_base: 0.0125, // 两头乌日增重速率 (中长期生长特性)
                noise_sd: 1.2   // 高斯噪声标准差
            };

            /** Box-Muller 变换：生成高斯分布随机数 (μ=0, σ=1) */
            function randn() {
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }

            function getGompertz(t, K, A, B) { return K * Math.exp(-A * Math.exp(-B * t)); }

            function render() {
                const T = parseFloat(tempSlider.value), F = parseFloat(feedSlider.value) / 100, H = parseFloat(healthSlider.value) / 100;
                
                // 环境惩罚项逻辑
                let tPenalty = 1.0;
                if (T > 25) tPenalty = 1.0 - (T - 25) * 0.035;
                else if (T < 18) tPenalty = 1.0 - (18 - T) * 0.01;
                const fPenalty = 0.75 + (F * 0.25);
                const B_agent = CONFIG.B_base * tPenalty * fPenalty;

                const daysArr = [], mathD = [], aiD = [], agentD = [], actualD = [];
                
                // 生物波动模拟器 (自相关噪声 / Random Walk)
                let cumulativeDrift = 0;

                // 统一采样步长：每 5 天采一个点
                const step = 5;

                for (let i = 0; i <= CONFIG.days; i++) {
                    // 全局索引仍然存在，但只在 step 倍数时推入有效数据以保持点位对齐
                    if (i % step === 0) {
                        daysArr.push('D' + i);
                        
                        // 1. 通用智能线 (大幅增加离散度与抖动感)
                        const aiTarget = getGompertz(i, CONFIG.K, CONFIG.A, CONFIG.B_base * 0.95);
                        const aiOscillation = Math.sin(i / 2) * 8 + (Math.random() - 0.5) * 15; 
                        aiD.push(Math.max(0.2, aiTarget + aiOscillation).toFixed(2));

                        // 2. 传统数学模型
                        mathD.push(getGompertz(i, CONFIG.K, CONFIG.A, CONFIG.B_base).toFixed(2));

                        // 3. 智能体线
                        const agentVal = getGompertz(i, CONFIG.K, CONFIG.A, B_agent);
                        agentD.push(agentVal.toFixed(2));

                        // 4. 实验实测数据 (保持与智能体线同步采样)
                        // 计算累积漂移 (这里简化一下，既然采样步长变了，我们直接按步长模拟)
                        cumulativeDrift = cumulativeDrift * 0.85 + randn() * 0.8;
                        let actVal = agentVal + cumulativeDrift;
                        if (i > 60) {
                            const healthImpact = (1 - H) * 0.12 * Math.min(1, (i - 60) / 40);
                            actVal *= (1 - healthImpact);
                        }
                        actVal += randn() * 0.35;
                        actualD.push(Math.max(0.2, actVal).toFixed(2));
                    }
                }

                effVal.innerText = (tPenalty * fPenalty * 100).toFixed(1) + "%";
                weightVal.innerText = agentD[agentD.length - 1] + " kg";
                effVal.style.color = (tPenalty * fPenalty) < 0.85 ? '#ff4d4d' : '#00f2ff';

                myChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { 
                        trigger: 'axis', 
                        backgroundColor: 'rgba(0,10,20,0.95)', 
                        borderColor: 'rgba(0,242,255,0.4)', 
                        borderWidth: 1,
                        textStyle: { color:'#fff', fontFamily: 'Inter', fontSize: 14 } 
                    },
                    legend: { 
                        data: ['通用智能 (模型震荡)', '传统数学模型', '智能体 (动态拟合)', '实验实测数据'], 
                        selected: {
                            '通用智能 (模型震荡)': false,
                            '传统数学模型': false,
                            '智能体 (动态拟合)': false,
                            '实验实测数据': true
                        },
                        textStyle: { color: 'rgba(255,255,255,0.95)', fontSize: 20, fontWeight: 'bold' }, 
                        top: 5,
                        itemGap: 30,
                        itemWidth: 40,
                        itemHeight: 20
                    },
                    grid: { left: '5%', right: '5%', bottom: '12%', top: '18%', containLabel: true },
                    xAxis: { 
                        type: 'category', 
                        data: daysArr, 
                        axisLine: { lineStyle: { color: 'rgba(255,255,255,0.3)' } },
                        axisLabel: { color: 'rgba(255,255,255,0.8)', fontSize: 18, interval: 5 } // 增加刻度密度
                    },
                    yAxis: { 
                        type: 'value', 
                        name: '体重 (kg)',
                        nameTextStyle: { color: 'rgba(255,255,255,0.8)', fontSize: 20, padding: [0, 0, 0, 50] },
                        splitLine: { lineStyle: { color: 'rgba(255,255,255,0.15)', type: 'dashed' } },
                        axisLabel: { color: 'rgba(255,255,255,0.8)', fontSize: 18 }
                    },
                    series: [
                        { 
                            name: '通用智能 (模型震荡)', 
                            type: 'line', 
                            data: aiD, 
                            showSymbol: true,
                            symbolSize: 8,
                            lineStyle: { color: '#ff4d4d', opacity: 0.25, width: 2 } 
                        },
                        { 
                            name: '传统数学模型', 
                            type: 'line', 
                            data: mathD, 
                            showSymbol: true,
                            symbol: 'rect',
                            symbolSize: 10,
                            lineStyle: { color: '#ffffff', width: 4, type: 'solid', shadowBlur: 10, shadowColor: '#fff' },
                            itemStyle: { color: '#ffffff' }
                        },
                        { 
                            name: '智能体 (动态拟合)', 
                            type: 'line', 
                            data: agentD, 
                            showSymbol: true,
                            symbolSize: 14,
                            lineStyle: { width: 8, color: '#00f2ff', shadowBlur: 20, shadowColor: 'rgba(0,242,255,0.9)' }, 
                            smooth: 0.3 
                        },
                        { 
                            name: '实验实测数据', 
                            type: 'line',
                            data: actualD, 
                            symbol: 'diamond',
                            symbolSize: 18, 
                            itemStyle: { color: '#ffaa00', opacity: 1, borderWidth: 2, borderColor: '#fff' }, 
                            lineStyle: { width: 0 }
                        }
                    ]
                });
            }

            [tempSlider, feedSlider, healthSlider].forEach(s => {
                s.oninput = () => {
                    const dispMap = { 'temp-slider': tempDisp, 'feed-slider': feedDisp, 'health-slider': healthDisp };
                    dispMap[s.id].innerText = s.value + (s.id === 'temp-slider' ? '' : '%');
                    render();
                };
            });
            window.onresize = () => myChart.resize();
            render();
        };

        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', boot); } else { boot(); }
    })();
    </script>
</body>
</html>
